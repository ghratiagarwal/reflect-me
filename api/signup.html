
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReflectMe | Create Account</title>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.15);
        }

        body, html {
            height: 100%; margin: 0;
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.3)), url('bg.png');
            background-size: cover; background-position: center; background-attachment: fixed;
            color: white; overflow: hidden;
        }

        .signup-container {
            height: 100vh; display: flex; justify-content: center; align-items: center;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 25px;
            padding: 40px; width: 100%; max-width: 420px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .glass-card h2 {
            font-weight: 600; letter-spacing: 2px; margin-bottom: 25px; text-transform: uppercase;
        }

        .form-group { text-align: left; margin-bottom: 15px; }

        label {
            font-size: 0.75rem; font-weight: 300; letter-spacing: 1px;
            margin-bottom: 8px; display: block; opacity: 0.8;
        }

        .form-control {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid var(--glass-border);
            border-radius: 12px; color: white !important;
            padding: 10px 15px; transition: all 0.3s ease;
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.5);
            box-shadow: none; outline: none;
        }

        .btn-signup {
            background: white; color: black; border: none;
            border-radius: 30px; padding: 12px; width: 100%;
            font-weight: 600; text-transform: uppercase;
            letter-spacing: 2px; margin-top: 15px; transition: 0.3s;
        }

        .btn-signup:hover {
            background: rgba(255, 255, 255, 0.8);
            transform: translateY(-2px);
        }

        .login-link { margin-top: 20px; font-size: 0.85rem; font-weight: 300; }
        .login-link a { color: #ffee58; text-decoration: none; font-weight: 600; }
        .login-link a:hover { text-decoration: underline; }
        
        /* Requirement text styling */
        .pwd-hint { font-size: 0.65rem; opacity: 0.6; margin-top: 5px; display: block; }
    </style>
</head>
<body>

    <div class="signup-container">
        <div class="glass-card">
            <h2>Create Account</h2>
            <form action="../config/registerUser.php" method="POST">
                <div class="form-group">
                    <label>USERNAME</label>
                    <input type="text" name="username" class="form-control" placeholder="Choose a name" required>
                </div>

                <div class="form-group">
                    <label>EMAIL ADDRESS</label>
                    <input type="email" name="email" class="form-control" placeholder="name@example.com" required>
                </div>

                <div class="form-group">
                    <label>PASSWORD</label>
                    <input type="password" name="password" class="form-control" 
                           placeholder="Create a strong password" 
                           minlength="8"
                           pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}"
                           title="Must contain at least 8 characters, including one uppercase letter and one number"
                           required>
                    <span class="pwd-hint">Min. 8 characters, 1 uppercase, 1 number</span>
                </div>

                <button type="submit" class="btn-signup">Join ReflectMe</button>

                <p class="login-link">
                    Already a member? <a href="login.php">Login Here</a>
                </p>
            </form>
        </div>
    </div>

</body>
</html>
